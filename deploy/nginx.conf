server {
    listen 80;
    server_name rb-rubydev.fr www.rb-rubydev.fr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name rb-rubydev.fr www.rb-rubydev.fr;

    # SSL,replace with your certificate paths
    # ssl_certificate     /etc/letsencrypt/live/rb-rubydev.fr/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/rb-rubydev.fr/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Static Next.js assets,immutable, cache 1 year
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Public images and audio,cache 30 days
    location /img/ {
        proxy_pass http://127.0.0.1:3001;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /song/ {
        proxy_pass http://127.0.0.1:3001;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Application
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Disable HTML caching (for SSG/SSR updates)
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Fallback when Node/PM2 is down
    error_page 502 503 504 /502.html;
    location = /502.html {
        root /var/www/rb-rubydev/public;
        internal;
    }
}
